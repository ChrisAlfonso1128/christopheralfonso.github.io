<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie & Macro Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Calorie & Macro Calculator</h1>

<div class="form">

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Height (cm)</label>
<input type="number" id="height">

<label>Current Weight (lbs)</label>
<input type="number" id="weight">

<label>Goal Weight (lbs)</label>
<input type="number" id="goalWeight">

<label>Activity Level</label>
<select id="activity">
<option value="1.2">No Exercise</option>
<option value="1.375">Light Exercise</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
</select>

<button onclick="calculate()">Calculate</button>

</div>

<div id="results" class="results"></div>

<a href="../index.html" class="back">⬅ Back to Portfolio</a>

</div>

<script src="script.js"></script>
</body>
</html>
