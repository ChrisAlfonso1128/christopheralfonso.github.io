<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake</title>

<style>

body{
margin:0;
background:#020617;
font-family:Arial, sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

h1{
color:#38bdf8;
margin-bottom:10px;
}

canvas{
background:#020617;
border:2px solid #1e293b;
box-shadow:0 0 25px rgba(56,189,248,.3);
display:none;
}

.ui{
margin-top:10px;
display:flex;
gap:20px;
font-size:18px;
display:none;
}

/* MENU SCREENS */

.menu{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#020617;
}

.menu h2{
margin-bottom:20px;
}

.menu button{
margin:10px;
padding:12px 30px;
font-size:18px;
border:none;
background:#38bdf8;
cursor:pointer;
}

.menu button:hover{
background:#7dd3fc;
}

</style>
</head>

<body>

<h1>Neon Snake</h1>

<!-- MAIN MENU -->
<div class="menu" id="mainMenu">
<h2>Snake</h2>
<button onclick="startGame()">Start Game</button>
<button onclick="goPortfolio()">Back to Portfolio</button>
</div>

<!-- GAME OVER MENU -->
<div class="menu" id="gameOverMenu" style="display:none;">
<h2>Game Over</h2>
<button onclick="restart()">Play Again</button>
<button onclick="goPortfolio()">Back to Portfolio</button>
</div>

<canvas id="game" width="500" height="500"></canvas>

<div class="ui">
<div>Score: <span id="score">0</span></div>
<div>High Score: <span id="highscore">0</span></div>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const mainMenu = document.getElementById("mainMenu")
const gameOverMenu = document.getElementById("gameOverMenu")
const ui = document.querySelector(".ui")

const grid = 25

let snake
let food
let score=0
let speed=120
let lastTime=0
let running=false

let highscore = localStorage.getItem("snakeHigh") || 0
document.getElementById("highscore").innerText = highscore

function randomPos(){
return Math.floor(Math.random()*20)*grid
}

function startGame(){

mainMenu.style.display="none"
canvas.style.display="block"
ui.style.display="flex"

init()

running=true

requestAnimationFrame(update)

}

function init(){

snake={
x:250,
y:250,
dx:grid,
dy:0,
cells:[],
max:4
}

food={
x:randomPos(),
y:randomPos()
}

score=0
speed=120

document.getElementById("score").innerText=0

}

function update(time){

if(!running) return

requestAnimationFrame(update)

if(time-lastTime < speed) return

lastTime=time

ctx.clearRect(0,0,canvas.width,canvas.height)

snake.x += snake.dx
snake.y += snake.dy

if(snake.x < 0 || snake.y < 0 || snake.x >= canvas.width || snake.y >= canvas.height){
gameOver()
return
}

snake.cells.unshift({x:snake.x,y:snake.y})

if(snake.cells.length > snake.max){
snake.cells.pop()
}

snake.cells.forEach((cell,index)=>{

ctx.fillStyle="#22c55e"
ctx.shadowBlur=20
ctx.shadowColor="#22c55e"
ctx.fillRect(cell.x,cell.y,grid-2,grid-2)

if(cell.x===food.x && cell.y===food.y){

snake.max++
score++
speed *= .95

document.getElementById("score").innerText=score

food.x=randomPos()
food.y=randomPos()

}

for(let i=index+1;i<snake.cells.length;i++){

if(cell.x===snake.cells[i].x && cell.y===snake.cells[i].y){
gameOver()
}

}

})

ctx.shadowBlur=0

ctx.fillStyle="#ef4444"
ctx.fillRect(food.x,food.y,grid-2,grid-2)

}

function gameOver(){

running=false

canvas.style.display="none"
ui.style.display="none"

gameOverMenu.style.display="flex"

if(score > highscore){
highscore = score
localStorage.setItem("snakeHigh",score)
document.getElementById("highscore").innerText = score
}

}

function restart(){

gameOverMenu.style.display="none"

canvas.style.display="block"
ui.style.display="flex"

init()

running=true

requestAnimationFrame(update)

}

function goPortfolio(){
window.location.href="../../index.html"
}

document.addEventListener("keydown",e=>{

if(!running) return

if(e.key==="ArrowLeft" && snake.dx===0){
snake.dx=-grid
snake.dy=0
}

else if(e.key==="ArrowRight" && snake.dx===0){
snake.dx=grid
snake.dy=0
}

else if(e.key==="ArrowUp" && snake.dy===0){
snake.dy=-grid
snake.dx=0
}

else if(e.key==="ArrowDown" && snake.dy===0){
snake.dy=grid
snake.dx=0
}

})

</script>

</body>
</html>
